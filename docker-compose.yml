name: momo-store

services:
  backend:
    profiles:
      - prod # профиль прода для бэкенда
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: momo-store-backend:${APP_VERSION:-1.0.0}
    restart: unless-stopped
    init: true

    environment:
      APP_ENV: ${APP_ENV:-production}

    expose:
      - "8081"

    volumes:
      - type: volume
        source: backend-data
        target: /app/data

    secrets:
      - source: backend_app_secret
        target: backend_app_secret
        mode: 0444

    networks:
      - app_net

    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8081/health || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid,nodev

    user: "10001:10001"

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    cpus: "0.50"
    mem_limit: 128m
    mem_reservation: 64m
    pids_limit: 100

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    profiles:
      - prod # профиль прода для фронта
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VUE_APP_API_URL: ${VUE_APP_API_URL:-/api}
    image: momo-store-frontend:${APP_VERSION:-1.0.0}
    restart: unless-stopped
    init: true

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "${FRONTEND_HOST_PORT:-80}:8080"

    volumes:
      - type: volume
        source: frontend-cache
        target: /var/cache/nginx

    networks:
      - public_net
      - app_net

    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid,nodev
      - /var/run:size=16m,noexec,nosuid,nodev

    user: "101:101"

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    cpus: "0.50"
    mem_limit: 128m
    mem_reservation: 64m
    pids_limit: 100

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend-debug:
    profiles:
      - dev # профиль прода для бэкенда в режиме отладки
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: momo-store-backend:${APP_VERSION:-1.0.0}
    restart: unless-stopped
    init: true

    environment:
      APP_ENV: development

    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-8081}:8081" # в отладке даём посмотреть на апи через браузер

    volumes:
      - type: volume
        source: backend-data
        target: /app/data

    secrets:
      - source: backend_app_secret
        target: backend_app_secret
        mode: 0444

    networks:
      dev_net:
        aliases:
          - backend # даём алиас, иначе фронт не найдёт бэкенд в отладке

    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8081/health || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid,nodev

    user: "10001:10001"

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    cpus: "0.50"
    mem_limit: 128m
    mem_reservation: 64m
    pids_limit: 100

  frontend-debug:
    profiles:
      - dev # профиль прода для фронта в режиме отладки
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VUE_APP_API_URL: http://localhost:${BACKEND_HOST_PORT:-8081}
    image: momo-store-frontend:${APP_VERSION:-1.0.0}
    restart: unless-stopped
    init: true

    depends_on:
      backend-debug:
        condition: service_healthy

    ports:
      - "${FRONTEND_DEV_HOST_PORT:-8080}:8080"

    volumes:
      - type: volume
        source: frontend-cache
        target: /var/cache/nginx

    networks:
      - dev_net

    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid,nodev
      - /var/run:size=16m,noexec,nosuid,nodev

    user: "101:101"

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    cpus: "0.50"
    mem_limit: 128m
    mem_reservation: 64m
    pids_limit: 100

networks:
  public_net:
    driver: bridge

  app_net:
    driver: bridge
    internal: true

  dev_net:
    driver: bridge

volumes:
  backend-data:
    name: momo-store-backend-data

  frontend-cache:
    name: momo-store-frontend-cache

secrets:
  backend_app_secret:
    file: ./secrets/backend_app_secret.txt